name: Weekly Newsletter

on:
  schedule:
    - cron: "0 14 * * 1"  # Monday 14:00 UTC, after the weekend's tournament wraps
  workflow_dispatch: {}

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile and send newsletter
        env:
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_SERVER_PREFIX: ${{ secrets.MAILCHIMP_SERVER_PREFIX }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
        run: python pipeline.py newsletter --tour pga
